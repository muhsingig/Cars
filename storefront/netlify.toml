[build]
 command = "npm run build"
 publish = ".next"

[[plugins]]
 package = "@netlify/plugin-nextjs"

[[headers]]
 for = "/_next/static/*"
 [headers.values]
   Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
 for = "/assets/*"
 [headers.values]
   Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
 for = "/*.jpg"
 [headers.values]
   Cache-Control = "public, max-age=31536000, immutable"
